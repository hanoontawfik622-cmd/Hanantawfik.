<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Page</title>

<style>
body{
  margin:0;
  background:rgb(0, 0, 0);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* الفيديو */
video{
  width:100%;
  height:100vh;
  object-fit:cover;
  display:block;
}

/* 📱 الموبايل */
@media (max-width:768px){

  body{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  video{
    width:90%;
    height:auto;
    max-height:70vh;
    border-radius:15px;
  }
}
</style>
</head>

<body>

<video id="myVideo" muted autoplay playsinline>
  <source src="WhatsApp Video 2026-04-22 at 8.54.08 PM.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("myVideo");

// تشغيل الفيديو (حل مشكلة الموبايل)
function playVideo(){
  video.muted = true;
  video.playsInline = true;

  video.play().catch(()=>{});
}

// تشغيل أول ما الصفحة تفتح
window.addEventListener("load", playVideo);

// لو الموبايل منع التشغيل
document.body.addEventListener("click", playVideo, {once:true});
document.body.addEventListener("touchstart", playVideo, {once:true});

// لما الفيديو يخلص يروح لصفحة تانية
video.addEventListener("ended", () => {
  window.location.href = "index1.html";
});
</script>

</body>
</html>
